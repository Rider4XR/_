<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Change Password</title>
  <script>document.documentElement.dataset.theme=localStorage.r4Theme||'dark'</script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
<div class="bg-video"></div>
<section class="card login-card">
  <div class="brand"><div class="logo"><img src="assets/logo_icon.png" alt="Rider4XR logo"></div><h2>Change Password</h2></div>
  <p class="hint">Password change kiye bina booking/order accept nahi hoga. Temporary password same nahi rakh sakte.</p>
  <p class="hint">Rule: minimum 6 characters, 1 alphabet, aur 1 number ya symbol.</p>
  <div class="field password-field"><label>New Password</label><input id="newPass" type="password"><button type="button" class="mini-btn" onclick="togglePass('newPass')">Show</button></div>
  <div class="field password-field"><label>Confirm Password</label><input id="confirmPass" type="password"><button type="button" class="mini-btn" onclick="togglePass('confirmPass')">Show</button></div>
  <button onclick="changePassword()">Save Password</button>
</section>
<script src="app.js"></script>
</body>
</html>
