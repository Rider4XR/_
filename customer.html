<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Customer - Rider4XR</title><script>document.documentElement.dataset.theme=localStorage.r4Theme||'dark'</script><link rel='stylesheet' href='style.css'><link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'></head><body onload='loadCustomer()'><header><div class='brand'><div class='logo'><img src='assets/logo_icon.png' alt='Rider4XR logo'></div><div><span id='hello'>Customer</span><br><small>Book delivery</small></div></div><button class='ghost' onclick='logout()'>Logout</button></header><main class='wrap panel'><aside class='card'><h2>Where to?</h2><div class='pill'>Current location auto detect</div><div class='field'><label>Drop Location</label><input id='drop' placeholder='Search any India location'></div><button onclick='searchDrop()'>Find Route</button><div class='field'><label>Book for</label><select id='forWhom'><option>Myself</option><option>Someone Else</option></select></div><div class='field'><label>Receiver Name / Mobile</label><input id='receiver' placeholder='Optional'></div><div class='stats' style='grid-template-columns:1fr 1fr'><div class='stat'><small>Distance</small><b id='distance'>--</b></div><div class='stat'><small>Total Fare</small><b id='fare'>--</b></div></div><p class='hint'>Rider payout: <b id='riderPay'>--</b> | UPI: 9929562585@ptyes</p><div class='field'><label>Payment</label><select id='payment'><option>Cash</option><option>Online UPI</option></select></div><div id='swipe' class='swipe'><span>Swipe bike to book</span><div id='knob' class='knob'>🏍️</div></div><h3>Previous Rides</h3><div id='history' class='list'></div></aside><section><div id='map' class='map'></div></section></main><script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script><script src='app.js'></script></body></html>
