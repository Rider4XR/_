<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rider4XR Rider</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg"></div>
  <div class="road-lines"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo">R4X</div>
      <div>
        <strong>Rider Panel</strong>
        <small id="riderMobile">Rider4XR</small>
      </div>
    </div>
    <nav class="nav">
      <a class="btn ghost" href="customer.html">Customer</a>
      <a class="btn ghost" href="admin.html">Admin</a>
      <button class="ghost" onclick="logoutUser()">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="grid-2">
      <section class="card">
        <h1>Rider Status</h1>
        <p class="muted">Go online to receive demo orders.</p>

        <div class="actions">
          <button onclick="enableRiderBeep()">Enable Beep</button>
          <button onclick="setOnline(true)">Go Online</button>
          <button class="ghost" onclick="setOnline(false)">Go Offline</button>
          <button class="ghost" onclick="testBeep()">Test Beep</button>
        </div>

        <div class="stats">
          <div><small>Status</small><b id="onlineStatus">Offline</b></div>
          <div><small>Beep</small><b id="beepStatus">Off</b></div>
          <div><small>Completed</small><b id="completedCount">0</b></div>
          <div><small>Earning</small><b id="earningText">₹0</b></div>
          <div><small>Settlement Due</small><b id="settlementText">₹0</b></div>
        </div>

        <p class="note">Real version will add document verification, admin approval, settlement proof and auto block rules.</p>
      </section>

      <section id="newOrdersCard" class="card">
        <h2>New Orders Ring</h2>
        <div id="newOrders" class="list"></div>
      </section>
    </section>

    <section class="card">
      <h2>Accepted Orders</h2>
      <div id="acceptedOrders" class="list"></div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pricing.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/beep.js"></script>
  <script src="js/rider.js"></script>
</body>
</html>
