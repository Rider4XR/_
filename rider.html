<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Rider - Rider4XR</title><script>document.documentElement.dataset.theme=localStorage.r4Theme||'dark'</script><link rel='stylesheet' href='style.css'></head><body onload='loadRider()'><header><div class='brand'><div class='logo'><img src='assets/logo_icon.png' alt='Rider4XR logo'></div><div><span id='riderName'>Rider</span><br><small>3 KM ring panel</small></div></div><button class='ghost' onclick='logout()'>Logout</button></header><main class='wrap'><div class='grid'><section class='card' id='ringBox'><h2>Rider Status</h2><button onclick='setOnline(true)'>Online</button> <button class='ghost' onclick='setOnline(false)'>Offline</button><p class='hint'>Nearby order aate hi ring/beep chalegi.</p></section><section class='card'><h2>Earnings</h2><div class='stats' style='grid-template-columns:1fr 1fr'><div class='stat'><small>Done</small><b id='done'>0</b></div><div class='stat'><small>Total</small><b id='earn'>₹0</b></div></div></section><section class='card'><h2>Documents</h2><p class='hint'>DL, Aadhaar, RC approval admin panel se hoga.</p></section>
<section class='card'><h2>Rider Help</h2><div class='field'><label>Issue Type</label><select id='riderIssue'><option>Customer call nahi उठा रहा</option><option>Wrong address</option><option>Customer absent</option><option>Payment dispute</option><option>Vehicle issue</option><option>Emergency</option><option>Other</option></select></div><div class='field'><label>Message</label><textarea id='riderIssueMsg' placeholder='Issue detail'></textarea></div><button class='ghost' onclick="sendSupport('rider')">WhatsApp Admin</button></section></div><section class='card' style='margin-top:18px'><h2>New Ride Ring</h2><div id='orders' class='list'></div></section><section class='card' style='margin-top:18px'><h2>My Active / Completed Rides</h2><div id='riderRides' class='list'></div></section></main><script src='app.js'></script></body></html>
